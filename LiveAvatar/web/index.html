<!doctype html>
<html lang="kk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ORTAx LiveAvatar</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0b10;
        color: #fff;
        font-family: -apple-system, system-ui, sans-serif;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }
      #status {
        position: fixed;
        top: max(env(safe-area-inset-top), 12px);
        left: 12px;
        right: 12px;
        font-size: 13px;
        opacity: 0.8;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="avatar" autoplay playsinline></video>
    </div>
    <div id="status">Қосылып жатыр…</div>

    <script type="module">
      // Flutter ↔ web көпір.
      // Flutter-ден түсетін хабарлар: window.flutterInbox(JSON)
      // Web-тен Flutter-ге: window.FlutterChannel.postMessage(JSON)
      const statusEl = document.getElementById('status');
      const videoEl = document.getElementById('avatar');

      const setStatus = (msg) => {
        statusEl.textContent = msg;
        sendToFlutter({ type: 'status', message: msg });
      };

      const sendToFlutter = (payload) => {
        try {
          window.FlutterChannel?.postMessage(JSON.stringify(payload));
        } catch (e) {
          console.warn('FlutterChannel жоқ', e);
        }
      };

      const params = new URLSearchParams(location.search);
      const apiBase = params.get('api') || '';
      const authToken = params.get('jwt') || '';

      async function api(path, body) {
        const res = await fetch(`${apiBase}${path}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: authToken ? `Bearer ${authToken}` : '',
          },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) throw new Error(`${path} → ${res.status}`);
        return res.json();
      }

      let pc = null;
      let sessionId = null;

      async function start() {
        try {
          setStatus('Сессия ашылуда…');
          const session = await api('/live-avatar/session/new', {
            quality: 'medium',
          });
          sessionId = session.session_id;

          pc = new RTCPeerConnection({ iceServers: session.ice_servers2 });
          pc.ontrack = (e) => {
            videoEl.srcObject = e.streams[0];
            setStatus('');
          };
          pc.onconnectionstatechange = () => {
            sendToFlutter({ type: 'pc', state: pc.connectionState });
          };

          await pc.setRemoteDescription(session.sdp);
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);

          await api('/live-avatar/session/start', {
            session_id: sessionId,
            sdp: answer,
          });
        } catch (e) {
          setStatus('Қате: ' + e.message);
          sendToFlutter({ type: 'error', message: String(e) });
        }
      }

      async function speak(text) {
        if (!sessionId) return;
        await api('/live-avatar/session/task', {
          session_id: sessionId,
          text,
          task_type: 'repeat',
        });
      }

      async function stop() {
        if (!sessionId) return;
        try {
          await api('/live-avatar/session/stop', { session_id: sessionId });
        } finally {
          pc?.close();
          pc = null;
          sessionId = null;
        }
      }

      window.flutterInbox = (raw) => {
        try {
          const msg = JSON.parse(raw);
          if (msg.type === 'speak') speak(msg.text);
          if (msg.type === 'stop') stop();
        } catch (e) {
          console.warn('inbox parse', e);
        }
      };

      start();
      window.addEventListener('beforeunload', stop);
    </script>
  </body>
</html>
